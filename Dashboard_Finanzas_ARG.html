<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financiero · Acceso restringido</title>
<style>
  :root{--bg:#0b0d14;--panel:#151926;--panel2:#1b2030;--line:#262c3d;--line2:#323a50;--ink:#eef1f8;--ink2:#c7cde0;--muted:#8b93ab;--gold:#e8c46a;--violet:#a78bfa;--red:#f87171;--green:#34d399}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter','Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);
    background:radial-gradient(1200px 500px at 80% -10%,rgba(124,58,237,.18),transparent 60%),radial-gradient(900px 500px at -5% 0%,rgba(56,189,248,.10),transparent 55%),var(--bg);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .box{width:100%;max-width:380px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:20px;padding:34px 30px;box-shadow:0 18px 50px rgba(0,0,0,.55);text-align:center}
  .logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#7c3aed,#38bdf8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;margin:0 auto 18px;box-shadow:0 8px 22px rgba(124,58,237,.45);letter-spacing:.5px}
  h1{font-size:18px;font-weight:700;margin-bottom:6px}
  .sub{font-size:12.5px;color:var(--muted);margin-bottom:22px;line-height:1.5}
  input{width:100%;background:#0e1119;border:1px solid var(--line2);border-radius:11px;padding:13px 15px;color:var(--ink);font-size:15px;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--violet)}
  button{width:100%;margin-top:12px;background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:filter .15s}
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.6;cursor:wait}
  .err{color:var(--red);font-size:12.5px;margin-top:13px;min-height:16px;font-weight:600}
  .foot{font-size:10.5px;color:var(--muted);margin-top:20px;line-height:1.5}
  .pwwrap{position:relative}
  .pwwrap input{width:100%;padding-right:44px}
  .pwwrap .eyebtn{position:absolute;right:5px;top:50%;transform:translateY(-50%);width:34px;height:34px;margin:0;padding:0;background:transparent;border:none;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:color .15s,background .15s}
  .pwwrap .eyebtn:hover{color:var(--ink2);background:rgba(255,255,255,.07)}
</style>
</head>
<body>
<div class="box" id="gate">
  <div class="logo">SF</div>
  <h1>Acceso restringido</h1>
  <div class="sub">Dashboard Financiero · Sofia Ferrer<br>Solo socios. Ingresá la contraseña.</div>
  <form id="f" autocomplete="off">
    <div class="pwwrap">
      <input id="pw" type="password" placeholder="Contraseña" autofocus autocomplete="current-password">
      <button id="pwtoggle" class="eyebtn" type="button" aria-label="Mostrar contraseña" title="Mostrar contraseña"></button>
    </div>
    <button id="btn" type="submit">Entrar</button>
  </form>
  <div class="err" id="err"></div>
  <div class="foot">Los datos están cifrados (AES-256). Sin la contraseña correcta no se pueden leer.</div>
</div>

const b2u=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const EYE_OPEN='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>';
const EYE_CLOSED='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.6 21.6 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.6 21.6 0 0 1-2.61 3.81M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
(function(){
  const pwInput=document.getElementById('pw'),pwToggle=document.getElementById('pwtoggle');
  let visible=false;
  pwToggle.innerHTML=EYE_OPEN;
  pwToggle.addEventListener('click',()=>{
    visible=!visible;
    pwInput.type=visible?'text':'password';
    pwToggle.innerHTML=visible?EYE_CLOSED:EYE_OPEN;
    pwToggle.title=visible?'Ocultar contraseña':'Mostrar contraseña';
    pwToggle.setAttribute('aria-label',pwToggle.title);
    pwInput.focus();
  });
})();
async function unlock(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(P.s),iterations:P.it,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(P.i)},key,b2u(P.c));
  return new TextDecoder().decode(pt);
}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('btn'),err=document.getElementById('err');
  const pw=document.getElementById('pw').value;
  err.textContent='';btn.disabled=true;btn.textContent='Verificando...';
  try{
    const html=await unlock(pw);
    document.open();document.write(html);document.close();
  }catch(ex){
    err.textContent='Contraseña incorrecta.';
    btn.disabled=false;btn.textContent='Entrar';
    document.getElementById('pw').select();
  }
});
</script>
